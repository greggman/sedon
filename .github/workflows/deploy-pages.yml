name: Deploy to GitHub Pages

# Fires when a semver-shaped tag (vMAJOR.MINOR.PATCH) is pushed. Also
# exposes workflow_dispatch so you can re-run the latest tagged build by
# hand from the Actions tab without cutting a new tag.
on:
  push:
    branches:
      - main
    #tags:
    #  - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# Permissions required by actions/deploy-pages. `contents: read` to clone;
# `pages: write` to publish; `id-token: write` for OIDC-signed deploys.
permissions:
  contents: read
  pages: write
  id-token: write

# One active deployment at a time. We don't cancel in-progress because a
# half-deployed Pages site is worse than waiting an extra minute.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      # Gate the deploy on the same checks the local workflow runs. If
      # typecheck or tests fail, we don't ship a broken Pages site.
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Stage exactly what the page needs: index.html + the built dist
      # bundle. Everything else (src, tests, node_modules, scripts) stays
      # off the public artifact.
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r dist _site/dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
